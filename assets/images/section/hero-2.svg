<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="30" y="30" width="160" height="160" rx="34" fill="white" filter="url(#shadow)"/>

  <!-- Make icon -->
  <g transform="translate(110 110)">
    <rect x="-36" y="-12" width="22" height="22" rx="4" fill="#6C63FF" transform="rotate(-15 -36 -12)"/>
    <rect x="-6" y="10" width="22" height="22" rx="4" fill="#4DA3FF" transform="rotate(15 -6 10)"/>
    <rect x="24" y="-18" width="22" height="22" rx="4" fill="#8A7CFF" transform="rotate(-10 24 -18)"/>
  </g>
</svg>